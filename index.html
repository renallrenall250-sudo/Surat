<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Adekkkk Cantikk ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- AUDIO -->
<audio id="bgMusic" loop>
    <source src="https://files.catbox.moe/l3rsna.mp3" type="audio/mpeg">
</audio>

<!-- MUSIC BUTTON -->
<div class="music-player" id="musicBtn">
    <div class="disc"></div>
</div>

<!-- INTRO -->
<section class="intro">

    <img src="cover.jpg" class="cover">

    <div class="overlay"></div>

    <div class="intro-content">

        <span class="date">
            25 September 2022
        </span>

        <h1>
            Adekkkk Cantikk ❤️
        </h1>

        <p>
            Sebuah kenangan yang masih aku simpan.
        </p>

        <button id="openBtn">
            Buka Kenangan
        </button>

    </div>

</section>

<!-- STORY -->
<section class="story-page">

    <div class="story-container">

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <img id="storyImage" src="foto1.jpg">

        <div class="story-info">
            <h2>i lovee</h2>
        </div>

        <button id="prevBtn" class="nav left">
            ❮
        </button>

        <button id="nextBtn" class="nav right">
            ❯
        </button>

    </div>

</section>

<!-- LETTER -->
<section class="letter-section">

    <div class="letter-card">

        <span class="small-title">
            Surat Untuk Kamu
        </span>

        <h2>
            maaff Yaaa Sayanggg 💌
        </h2>

        <p id="typing"></p>

    </div>

</section>

<!-- FOOTER -->
<footer>

    <h3>
        I Love You 💟
    </h3>

    <p>
        Dari Apiss Untuk Adekkkk Cantikk
    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
